services:
  db:
    image: postgres:15-alpine
    container_name: ubak_db
    restart: always
    environment:
      POSTGRES_USER: postubak
      POSTGRES_PASSWORD: postubak123
      POSTGRES_DB: ubak_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: ubak_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: ubak@admin.com
      PGADMIN_DEFAULT_PASSWORD: adminubak123
    ports:
      - "5050:80"
    depends_on:
      - db

  backend:
    build: ./backend
    container_name: ubak_backend
    restart: always
    environment:
      DATABASE_URL: postgresql://postubak:postubak123@db:5432/ubak_db
      SECRET_KEY: a_very_secret_key_change_me_in_production
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
    ports:
      - "8800:8800"
    depends_on:
      - db

  frontend:
    build: ./frontend
    container_name: ubak_frontend
    restart: always
    ports:
      - "3001:80"
    depends_on:
      - backend

volumes:
  postgres_data:
