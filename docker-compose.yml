services:
  db:
    image: postgres:15-alpine
    container_name: ubak_db_dev
    restart: always
    environment:
      POSTGRES_USER: postubak
      POSTGRES_PASSWORD: postubak123
      POSTGRES_DB: ubak_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: ubak_backend_dev
    restart: always
    environment:
      DATABASE_URL: postgresql://postubak:postubak123@db:5432/ubak_db
      SECRET_KEY: a_very_secret_key_change_me_in_production
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
    ports:
      - "8800:8805"
    depends_on:
      - db

volumes:
  postgres_data:
